# A Statlog heart disease example


``` r
Y = X[, c(1, 4, 5, 8)]
Y = scale(Y)

d = ar_dist(x = Y, sim_dist = TRUE)

p = table(d$rho_sim)

dd = as.numeric(names(p))
idx = which.min(abs(dd - d$rho)) + 1
dd = round(dd, 3)

df = data.frame(Prob = as.vector(p)/sum(as.vector(p)),
                rho = as.factor(dd))

ggplot(df) + 
  geom_bar(aes(x = rho, y = Prob), stat="identity") + 
  geom_vline(
    xintercept = idx, 
    linewidth = 1,
    linetype = 2) +
  theme(
    axis.text.x = element_text(angle = 45)
  )
```

# A Statlog heart disease example


``` r
library(huge)

res = huge(x = Y, 
           nlambda = 100,
           method = "glasso",
           verbose = FALSE)

res_sel = huge.select(res, 
                      criterion = "ric",
                      verbose = FALSE)

R = -cov2cor(res_sel$opt.icov)
colnames(R) = rownames(R) = colnames(Y)

round(R, 3)
```

```
##             age trestbps   chol thalach
## age      -1.000    0.182  0.127  -0.361
## trestbps  0.182   -1.000  0.121   0.007
## chol      0.127    0.121 -1.000   0.000
## thalach  -0.361    0.007  0.000  -1.000
```

# A Statlog heart disease example


``` r
M = 10^3

rho_null = rep(0, M)

n = nrow(Y)

mu = rep(0, ncol(Y))

for(i in 1:M){
  
  XX = mvtnorm::rmvnorm(n = n, mean = mu)
  
  rho_null[i] = ar_dist(x = XX)$rho
  
}

(sum(rho_null &lt;= d$rho) + 1)/(M + 1)
```

```
## [1] 0.003996004
```

``` r
hist(rho_null, probability = TRUE)
abline(v = d$rho, lty = 2, lwd = 2)
```
